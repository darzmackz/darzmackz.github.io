<header class="site-header">
  <div class="container">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      {% if site.logo %}
      <img src="{{ site.logo | relative_url }}" alt="{{ site.title }} Logo" class="logo-image" />
      {% else %}
      <span class="logo-icon">&#9670;</span> {{ site.title }}
      {% endif %}
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a></li>
        <li><a href="{{ '/portfolio/' | relative_url }}"{% if page.url contains '/portfolio' %} class="active"{% endif %}>Portfolio</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains '/contact' %} class="active"{% endif %}>Contact</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <button class="dark-mode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
