<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  {% seo %}
  {% feed_meta %}
  <!-- Google AdSense -->
  <meta name="google-adsense-account" content="{{ site.google_adsense_publisher_id }}" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.google_adsense_publisher_id }}"
     crossorigin="anonymous"></script>
</head>
<body>
  {% include header.html %}

  <!-- Header Ad Slot -->
  {% include adsense-header.html %}

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- Footer Ad Slot -->
  {% include adsense-footer.html %}

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
