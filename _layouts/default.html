<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:image" content="{{ '/assets/images/logo.png' | absolute_url }}" />
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="{{ page.url | absolute_url }}" />
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="twitter:image" content="{{ '/assets/images/logo.png' | absolute_url }}" />
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <!-- Preload critical resources -->
  <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style" />
  <link rel="preload" href="{{ '/assets/images/logo.png' | relative_url }}" as="image" />
  <!-- DNS prefetch for external resources -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//fonts.gstatic.com" />
  <link rel="dns-prefetch" href="//pagead2.googlesyndication.com" />
  <link rel="preconnect" href="https://www.youtube.com" />
  <link rel="preconnect" href="https://www.youtube-nocookie.com" />
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "url": "{{ site.url }}",
    "description": "{{ site.description }}",
    "publisher": {
      "@type": "Person",
      "name": "Darzmackz"
    }
  }
  </script>
  <!-- Prevent flash of unstyled dark/light mode: apply theme before CSS loads -->
  <script>
    (function () {
      var theme;
      try { theme = localStorage.getItem('theme'); } catch (e) {}
      if (theme === 'dark' || theme === 'light') {
        document.documentElement.setAttribute('data-theme', theme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  {% seo %}
  {% feed_meta %}
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}" />
  <!-- Google AdSense -->
  <meta name="google-adsense-account" content="{{ site.google_adsense_publisher_id }}" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.google_adsense_publisher_id }}"
     crossorigin="anonymous"></script>
</head>
<body>
  <!-- Skip to main content -->
  <a href="#main" class="skip-link">Skip to main content</a>

  {% include header.html %}

  <!-- Header Ad Slot -->
  {% include adsense-header.html %}

  <main class="site-main" id="main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- Footer Ad Slot -->
  {% include adsense-footer.html %}

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <!-- Scroll to top button -->
  <button class="scroll-to-top" aria-label="Scroll to top" title="Back to top">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
  </button>
</body>
</html>
